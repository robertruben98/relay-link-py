site_name: relay-link-py
site_description: Python client for the Relay Protocol API (relay.link) — fast crosschain bridge/swap across 70+ chains. Sync + async, Pydantic v2.
repo_url: https://github.com/robertruben98/relay-link-py
repo_name: robertruben98/relay-link-py

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
